<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindVault — מפת מחשבות 🗺️</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Heebo', sans-serif;
            background: #0a0a1a;
            color: #eee;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .header {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a3a;
        }
        
        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .header h1 span { color: #e94560; }
        
        .stats {
            display: flex;
            gap: 24px;
            font-size: 0.9rem;
            color: #888;
        }
        
        .stats .num { color: #e94560; font-weight: 700; }
        
        .controls {
            padding: 16px 30px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: #16213e;
            border: 1px solid #2a2a4a;
            color: #aaa;
            padding: 6px 16px;
            border-radius: 50px;
            font-family: 'Heebo';
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            border-color: #e94560;
            color: #fff;
            background: rgba(233, 69, 96, 0.15);
        }
        
        .main {
            display: grid;
            grid-template-columns: 1fr 350px;
            height: calc(100vh - 130px);
        }
        
        /* Map Area */
        .map-container {
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at center, #0f0f2a 0%, #0a0a1a 100%);
        }
        
        .map-canvas {
            width: 100%;
            height: 100%;
        }
        
        .thought-bubble {
            position: absolute;
            background: rgba(22, 33, 62, 0.9);
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 0.85rem;
            max-width: 200px;
            cursor: pointer;
            transition: all 0.3s;
            line-height: 1.5;
        }
        
        .thought-bubble:hover {
            border-color: #e94560;
            transform: scale(1.05);
            z-index: 10;
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.2);
        }
        
        .thought-bubble .date {
            font-size: 0.7rem;
            color: #e94560;
            margin-bottom: 4px;
        }
        
        .thought-bubble .tags {
            font-size: 0.7rem;
            color: #888;
            margin-top: 6px;
        }
        
        /* Sidebar */
        .sidebar {
            border-right: 1px solid #1a1a3a;
            padding: 24px;
            overflow-y: auto;
        }
        
        .sidebar h2 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: #e94560;
        }
        
        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 32px;
        }
        
        .tag-cloud .tag {
            background: rgba(233, 69, 96, 0.1);
            color: #e94560;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tag-cloud .tag:hover {
            background: rgba(233, 69, 96, 0.3);
        }
        
        .tag-cloud .tag.large { font-size: 1rem; font-weight: 700; }
        .tag-cloud .tag.medium { font-size: 0.9rem; font-weight: 500; }
        
        .timeline {
            list-style: none;
        }
        
        .timeline li {
            padding: 12px 0;
            border-bottom: 1px solid #1a1a3a;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        
        .timeline li .time {
            font-size: 0.75rem;
            color: #e94560;
        }
        
        .timeline li .content {
            color: #ccc;
            margin-top: 4px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }
        
        .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
        
        @media (max-width: 768px) {
            .main { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔐 Mind<span>Vault</span> — מפת מחשבות</h1>
        <div class="stats">
            <span><span class="num" id="total-count">0</span> מחשבות</span>
            <span><span class="num" id="week-count">0</span> השבוע</span>
            <span><span class="num" id="today-count">0</span> היום</span>
        </div>
    </div>
    
    <div class="controls">
        <button class="filter-btn active" data-days="7">שבוע אחרון</button>
        <button class="filter-btn" data-days="30">חודש</button>
        <button class="filter-btn" data-days="0">הכל</button>
    </div>
    
    <div class="main">
        <div class="map-container" id="map">
            <!-- Thought bubbles rendered here -->
        </div>
        <div class="sidebar">
            <h2>☁️ ענן נושאים</h2>
            <div class="tag-cloud" id="tag-cloud"></div>
            
            <h2>📋 ציר זמן</h2>
            <ul class="timeline" id="timeline"></ul>
        </div>
    </div>

    <script>
        // Config — update these with your Supabase details
        const SUPABASE_URL = 'https://pocrerdkajatgyzpysai.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvY3JlcmRrYWphdGd5enB5c2FpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjA2NTgsImV4cCI6MjA4OTgzNjY1OH0.zoy9WeaGfqZvu8sDYlOH5aIwZNfSbsr6NWklTZkLHnM';
        
        let allThoughts = [];
        
        // Fetch thoughts from Supabase
        async function fetchThoughts(daysBack = 7) {
            const since = new Date();
            if (daysBack > 0) since.setDate(since.getDate() - daysBack);
            else since.setFullYear(2020); // "all"
            
            const url = `${SUPABASE_URL}/rest/v1/thoughts?select=id,content,created_at,tags&created_at=gte.${since.toISOString()}&order=created_at.desc`;
            
            const res = await fetch(url, {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
            });
            
            allThoughts = await res.json();
            renderAll();
        }
        
        // Render everything
        function renderAll() {
            renderStats();
            renderMap();
            renderTagCloud();
            renderTimeline();
        }
        
        // Stats
        function renderStats() {
            document.getElementById('total-count').textContent = allThoughts.length;
            
            const weekAgo = new Date();
            weekAgo.setDate(weekAgo.getDate() - 7);
            const weekCount = allThoughts.filter(t => new Date(t.created_at) > weekAgo).length;
            document.getElementById('week-count').textContent = weekCount;
            
            const today = new Date().toDateString();
            const todayCount = allThoughts.filter(t => new Date(t.created_at).toDateString() === today).length;
            document.getElementById('today-count').textContent = todayCount;
        }
        
        // Map — position thoughts as bubbles
        function renderMap() {
            const map = document.getElementById('map');
            map.innerHTML = '';
            
            if (allThoughts.length === 0) {
                map.innerHTML = '<div class="empty-state"><div class="emoji">🧠</div><p>עוד אין מחשבות.<br>תתחיל לכתוב ב-MindVault!</p></div>';
                return;
            }
            
            const width = map.clientWidth;
            const height = map.clientHeight;
            const padding = 20;
            
            // Group by tags for clustering
            const tagGroups = {};
            allThoughts.forEach(t => {
                const mainTag = t.tags?.[0] || 'כללי';
                if (!tagGroups[mainTag]) tagGroups[mainTag] = [];
                tagGroups[mainTag].push(t);
            });
            
            // Assign cluster centers
            const tags = Object.keys(tagGroups);
            const clusterCenters = {};
            tags.forEach((tag, i) => {
                const angle = (2 * Math.PI * i) / tags.length;
                const radius = Math.min(width, height) * 0.3;
                clusterCenters[tag] = {
                    x: width / 2 + Math.cos(angle) * radius,
                    y: height / 2 + Math.sin(angle) * radius
                };
            });
            
            // Render bubbles
            allThoughts.forEach((thought, i) => {
                const mainTag = thought.tags?.[0] || 'כללי';
                const center = clusterCenters[mainTag];
                
                // Add some randomness around cluster center
                const jitterX = (Math.random() - 0.5) * 180;
                const jitterY = (Math.random() - 0.5) * 180;
                
                const x = Math.max(padding, Math.min(width - 220, center.x + jitterX));
                const y = Math.max(padding, Math.min(height - 100, center.y + jitterY));
                
                const bubble = document.createElement('div');
                bubble.className = 'thought-bubble';
                bubble.style.left = x + 'px';
                bubble.style.top = y + 'px';
                
                const date = new Date(thought.created_at);
                const dateStr = date.toLocaleDateString('he-IL');
                const timeStr = date.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
                const shortContent = thought.content.length > 80 
                    ? thought.content.substring(0, 80) + '...' 
                    : thought.content;
                const tagsStr = thought.tags?.length ? thought.tags.join(', ') : '';
                
                bubble.innerHTML = `
                    <div class="date">${dateStr} ${timeStr}</div>
                    ${shortContent}
                    ${tagsStr ? `<div class="tags">🏷️ ${tagsStr}</div>` : ''}
                `;
                
                bubble.title = thought.content;
                map.appendChild(bubble);
            });
        }
        
        // Tag Cloud
        function renderTagCloud() {
            const cloud = document.getElementById('tag-cloud');
            const tagCounts = {};
            
            allThoughts.forEach(t => {
                t.tags?.forEach(tag => {
                    tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                });
            });
            
            const sorted = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);
            const maxCount = sorted[0]?.[1] || 1;
            
            cloud.innerHTML = sorted.map(([tag, count]) => {
                const size = count / maxCount > 0.6 ? 'large' : count / maxCount > 0.3 ? 'medium' : '';
                return `<span class="tag ${size}" title="${count} מחשבות">${tag} (${count})</span>`;
            }).join('');
        }
        
        // Timeline
        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            
            timeline.innerHTML = allThoughts.slice(0, 20).map(t => {
                const date = new Date(t.created_at);
                const dateStr = date.toLocaleDateString('he-IL');
                const timeStr = date.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
                return `<li>
                    <div class="time">${dateStr} ${timeStr}</div>
                    <div class="content">${t.content}</div>
                </li>`;
            }).join('');
        }
        
        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                fetchThoughts(parseInt(btn.dataset.days));
            });
        });
        
        // Init
        fetchThoughts(7);
        
        // Auto-refresh every 30 seconds
        setInterval(() => {
            const activeBtn = document.querySelector('.filter-btn.active');
            fetchThoughts(parseInt(activeBtn.dataset.days));
        }, 30000);
    </script>
</body>
</html>
